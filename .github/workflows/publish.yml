name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish with
        required: true
        type: choice
        options:
          - beta
          - latest

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine publish metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease || false }}
          DISPATCH_NPM_TAG: ${{ github.event.inputs.npm_tag || '' }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            if [ "$RELEASE_PRERELEASE" = "true" ]; then
              npm_tag=beta
              release_channel=prerelease
            else
              npm_tag=latest
              release_channel=stable
            fi
          else
            if [ "$DISPATCH_NPM_TAG" != "beta" ] && [ "$DISPATCH_NPM_TAG" != "latest" ]; then
              echo "workflow_dispatch requires npm_tag to be beta or latest" >&2
              exit 1
            fi

            npm_tag="$DISPATCH_NPM_TAG"
            release_channel=manual
          fi

          package_version=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          package_name=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")
          tag_name="v$package_version"

          {
            echo "NPM_TAG=$npm_tag"
            echo "RELEASE_CHANNEL=$release_channel"
            echo "PACKAGE_VERSION=$package_version"
            echo "PACKAGE_NAME=$package_name"
            echo "TAG_NAME=$tag_name"
          } >> "$GITHUB_ENV"

      - name: Print publish metadata
        run: |
          echo "release_channel=$RELEASE_CHANNEL"
          echo "package_name=$PACKAGE_NAME"
          echo "package_version=$PACKAGE_VERSION"
          echo "tag_name=$TAG_NAME"
          echo "npm_tag=$NPM_TAG"

      - name: Check whether version already exists on npm
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "VERSION_ALREADY_PUBLISHED=true" >> "$GITHUB_ENV"
            echo "npm_version_status=already_published"
          else
            echo "VERSION_ALREADY_PUBLISHED=false" >> "$GITHUB_ENV"
            echo "npm_version_status=not_found"
          fi

      - name: Validate beta AWS configuration
        if: ${{ env.NPM_TAG == 'beta' && vars.SCURO_BETA_AWS_ROLE_ARN == '' }}
        run: |
          echo "::error title=Missing beta AWS role::Beta publishes require SCURO_BETA_AWS_ROLE_ARN so GitHub Actions can assume the beta AWS role through OIDC."
          echo "::error::Set SCURO_BETA_AWS_ROLE_ARN as a repository variable, or attach this job to the environment that defines it."
          exit 1

      - name: Configure AWS credentials for beta integration
        id: beta_aws_credentials
        if: ${{ env.NPM_TAG == 'beta' }}
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.SCURO_BETA_AWS_ROLE_ARN }}
          aws-region: ${{ vars.SCURO_BETA_AWS_REGION || 'us-east-1' }}

      - name: Explain beta AWS credential failure
        if: ${{ env.NPM_TAG == 'beta' && steps.beta_aws_credentials.outcome == 'failure' }}
        run: |
          echo "::error title=Unable to assume beta AWS role::aws-actions/configure-aws-credentials failed while preparing the beta integration checks."
          echo "::error::Most likely causes: SCURO_BETA_AWS_ROLE_ARN is empty or wrong, the IAM role trust policy does not allow this repo/workflow to use GitHub OIDC, or GitHub environment-scoped vars are not available to this job."
          echo "::error::Check the workflow permissions (id-token: write), the SCURO_BETA_AWS_ROLE_ARN variable, and the role trust policy conditions for this repository."
          exit 1

      - name: Verify release
        run: bun run release:check

      - name: Run hosted beta integration suite
        if: ${{ env.NPM_TAG == 'beta' }}
        env:
          SCURO_BETA_AWS_REGION: ${{ vars.SCURO_BETA_AWS_REGION || 'us-east-1' }}
          SCURO_BETA_RUNTIME_ENV_PARAMETER: ${{ vars.SCURO_BETA_RUNTIME_ENV_PARAMETER || '/scuro/beta/runtime-env' }}
        run: bun run test:int:beta

      - name: Optional beta RPC smoke
        if: ${{ vars.ENABLE_BETA_RPC_SMOKE == 'true' }}
        run: bun run smoke:beta

      - name: Publish public package with provenance
        if: ${{ github.event_name != 'workflow_dispatch' && !github.event.repository.private && env.VERSION_ALREADY_PUBLISHED != 'true' }}
        run: npm publish --access public --tag "$NPM_TAG" --provenance

      - name: Publish package without provenance
        if: ${{ (github.event_name == 'workflow_dispatch' || github.event.repository.private) && env.VERSION_ALREADY_PUBLISHED != 'true' }}
        run: npm publish --access public --tag "$NPM_TAG"

      - name: Skip duplicate npm publish
        if: ${{ env.VERSION_ALREADY_PUBLISHED == 'true' }}
        run: echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published on npm; skipping publish step."

      - name: Create matching GitHub Release for manual runs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub release $TAG_NAME already exists; skipping creation."
            exit 0
          fi

          prerelease_flag=""
          if [ "$NPM_TAG" = "beta" ]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$TAG_NAME" \
            --target "$GITHUB_SHA" \
            --title "$TAG_NAME" \
            --notes "Automated release for $PACKAGE_NAME@$PACKAGE_VERSION published with npm tag $NPM_TAG." \
            $prerelease_flag
