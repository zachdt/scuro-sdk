name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release
        run: bun run release:check

      - name: Optional beta RPC smoke
        if: ${{ secrets.BETA_TESTNET_RPC_URL != '' }}
        run: bun run smoke:beta
        env:
          BETA_TESTNET_RPC_URL: ${{ secrets.BETA_TESTNET_RPC_URL }}
          BETA_TESTNET_EXPECTED_CHAIN_ID: ${{ vars.BETA_TESTNET_EXPECTED_CHAIN_ID }}

      - name: Publish public package with provenance
        if: ${{ github.event_name != 'workflow_dispatch' && !github.event.repository.private }}
        run: npm publish --access public --provenance

      - name: Publish package without provenance
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.repository.private }}
        run: npm publish --access public
