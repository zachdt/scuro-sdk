name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package-check:
    name: Package Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run package verification
        run: bun run release:check

  beta-rpc-smoke:
    name: Optional Beta RPC Smoke
    if: ${{ secrets.BETA_TESTNET_RPC_URL != '' }}
    runs-on: ubuntu-latest
    needs: package-check

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run beta RPC smoke
        run: bun run smoke:beta
        env:
          BETA_TESTNET_RPC_URL: ${{ secrets.BETA_TESTNET_RPC_URL }}
          BETA_TESTNET_EXPECTED_CHAIN_ID: ${{ vars.BETA_TESTNET_EXPECTED_CHAIN_ID }}

