name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package-check:
    name: Package Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run package verification
        run: bun run release:check

  beta-rpc-smoke:
    name: Optional Beta RPC Smoke
    if: ${{ vars.ENABLE_BETA_RPC_SMOKE == 'true' }}
    runs-on: ubuntu-latest
    needs: package-check

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run beta RPC smoke
        run: bun run smoke:beta

  beta-live-integration:
    name: Optional Beta Live Integration
    if: ${{ vars.ENABLE_BETA_LIVE_INTEGRATION == 'true' }}
    runs-on: ubuntu-latest
    needs: package-check
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.SCURO_BETA_AWS_ROLE_ARN }}
          aws-region: ${{ vars.SCURO_BETA_AWS_REGION || 'us-east-1' }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run hosted beta integration suite
        env:
          SCURO_BETA_AWS_REGION: ${{ vars.SCURO_BETA_AWS_REGION || 'us-east-1' }}
          SCURO_BETA_RUNTIME_ENV_PARAMETER: ${{ vars.SCURO_BETA_RUNTIME_ENV_PARAMETER || '/scuro/beta/runtime-env' }}
        run: bun run test:int:beta
